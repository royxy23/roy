<!DOCTYPE html>
<html>
<head>
    <title>History Admin</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 40px;
        }

        h2 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 18px;
            background-color: white;
            color: #764ba2;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .back-btn:hover {
            background-color: #f1f1f1;
            transform: translateY(-2px);
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.2);
        }

        .card p {
            margin: 8px 0;
            color: #333;
        }

        .label {
            font-weight: bold;
            color: #764ba2;
        }

        hr {
            border: none;
            height: 1px;
            background: rgba(255,255,255,0.3);
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>History Semua Aspirasi</h2>

    <a href="{{ url_for('admin') }}" class="back-btn">← Kembali</a>
    <hr>

    {% for a in data %}
        <div class="card">
            <p><span class="label">Nama:</span> {{ a.nama }}</p>
            <p><span class="label">Akun:</span> {{ a.akun }}</p>
            <p><span class="label">Tanggal:</span> {{ a.tanggal }}</p>
            <p><span class="label">Status:</span> {{ a.status }}</p>
        </div>
    {% endfor %}
</div>

</body>
</html>
